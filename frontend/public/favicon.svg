<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d3b33"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#a7f3d0"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#bg)"/>

  <!-- Growth bars -->
  <rect x="30" y="76" width="12" height="26" rx="3" fill="#ffffff" opacity="0.55"/>
  <rect x="48" y="64" width="12" height="38" rx="3" fill="#ffffff" opacity="0.75"/>
  <rect x="66" y="50" width="12" height="52" rx="3" fill="#ffffff" opacity="0.9"/>

  <!-- Upward trend arrow -->
  <path d="M30 66 L58 44 L74 56 L100 30" stroke="url(#arrow)" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M84 28 L100 30 L98 46" stroke="url(#arrow)" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
